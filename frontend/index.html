<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Travel AI</title>

<style>
body {
    font-family: Arial;
    background-color: #f5f7fa;
    padding: 40px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    margin-bottom: 15px;
}

button {
    background-color: #3498db;
    color: white;
    font-weight: bold;
}

.resultado {
    border-left: 5px solid #3498db;
    background: #ecf5ff;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌍 Travel AI</h1>

<h3>Registro</h3>
<input type="email" id="reg_email" placeholder="Email">
<input type="password" id="reg_password" placeholder="Contraseña">
<button onclick="registro()">Crear cuenta</button>
<p id="reg_msg"></p>

<hr>

<h3>Login</h3>
<input type="email" id="login_email" placeholder="Email">
<input type="password" id="login_password" placeholder="Contraseña">
<button onclick="login()">Login</button>
<p id="login_msg"></p>

<hr>

<h3>Buscar viaje</h3>
<input type="number" id="presupuesto" placeholder="Presupuesto">

<select id="tipo">
<option value="playa">Playa</option>
<option value="cultura">Cultura</option>
<option value="aventura">Aventura</option>
</select>

<button onclick="buscar()">Buscar</button>

<div id="resultados"></div>

</div>

<script>

const API_URL = "https://travel-ai-app-lc7k.onrender.com";

let usuario_logueado = null;

// REGISTRO
async function registro() {
    let email = document.getElementById("reg_email").value;
    let password = document.getElementById("reg_password").value;

    let res = await fetch(`${API_URL}/registro?email=${email}&password=${password}`, {
        method: "POST"
    });

    let data = await res.json();
    document.getElementById("reg_msg").innerText = JSON.stringify(data);
}

// LOGIN
async function login() {
    let email = document.getElementById("login_email").value;
    let password = document.getElementById("login_password").value;

    let res = await fetch(`${API_URL}/login?email=${email}&password=${password}`, {
        method: "POST"
    });

    let data = await res.json();

    if (data.usuario) {
        usuario_logueado = data.usuario.email;
    }

    document.getElementById("login_msg").innerText = JSON.stringify(data);
}

// BUSCAR
async function buscar() {
    let presupuesto = document.getElementById("presupuesto").value;
    let tipo = document.getElementById("tipo").value;

    let res = await fetch(`${API_URL}/recomendar?presupuesto=${presupuesto}&tipo=${tipo}&email=${usuario_logueado}`);
    let data = await res.json();

    let resultados = document.getElementById("resultados");
    resultados.innerHTML = JSON.stringify(data, null, 2);
}

</script>

</body>
</html>
