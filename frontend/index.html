<script>

const API_URL = "https://travel-ai-app-lc7k.onrender.com";

let usuario_logueado = null;


// 🔁 RECUPERAR SESIÓN
window.onload = function() {
    let usuario_guardado = localStorage.getItem("usuario");

    if (usuario_guardado) {
        usuario_logueado = usuario_guardado;
        document.getElementById("login_msg").innerHTML = "✅ Sesión recuperada";
        cargarPerfil();
    }
};


// 👤 CARGAR PERFIL
async function cargarPerfil() {

    if (!usuario_logueado) return;

    try {
        let res = await fetch(`${API_URL}/perfil?email=${usuario_logueado}`);
        let data = await res.json();

        document.getElementById("user_email").innerHTML = data.email;
        document.getElementById("user_plan").innerHTML = data.plan.toUpperCase();
        document.getElementById("user_consultas").innerHTML = data.consultas;

    } catch (e) {
        console.log("Error cargando perfil");
    }
}


// 🔐 REGISTRO
async function registro() {

    let email = document.getElementById("reg_email").value;
    let password = document.getElementById("reg_password").value;
    let msg = document.getElementById("reg_msg");

    msg.innerHTML = "";

    if (!email || !password) {
        msg.innerHTML = "❌ Completa todos los campos";
        return;
    }

    try {
        let res = await fetch(`${API_URL}/registro?email=${email}&password=${password}`, {
            method: "POST"
        });

        let data = await res.json();

        if (data.detail) {
            msg.innerHTML = "❌ " + data.detail;
            return;
        }

        msg.innerHTML = "✅ Usuario creado";

        document.getElementById("login_email").value = email;
        document.getElementById("login_password").value = password;

    } catch (e) {
        msg.innerHTML = "❌ Error de conexión";
    }
}


// 🔐 LOGIN
async function login() {

    let email = document.getElementById("login_email").value;
    let password = document.getElementById("login_password").value;
    let msg = document.getElementById("login_msg");

    msg.innerHTML = "";

    try {
        let res = await fetch(`${API_URL}/login?email=${email}&password=${password}`, {
            method: "POST"
        });

        let data = await res.json();

        if (data.detail) {
            msg.innerHTML = "❌ " + data.detail;
            return;
        }

        usuario_logueado = data.usuario.email;
        localStorage.setItem("usuario", usuario_logueado);

        msg.innerHTML = "✅ Login correcto";

        cargarPerfil();

    } catch (e) {
        msg.innerHTML = "❌ Error de conexión";
    }
}


// 🔓 LOGOUT
function logout() {
    localStorage.removeItem("usuario");
    usuario_logueado = null;

    document.getElementById("login_msg").innerHTML = "Sesión cerrada";

    document.getElementById("user_email").innerHTML = "-";
    document.getElementById("user_plan").innerHTML = "-";
    document.getElementById("user_consultas").innerHTML = "-";
}


// 💳 PAGO
async function comprarPro() {

    let msg = document.getElementById("pago_msg");
    msg.innerHTML = "";

    if (!usuario_logueado) {
        msg.innerHTML = "❌ Debes iniciar sesión";
        return;
    }

    msg.innerHTML = "💳 Procesando pago...";

    setTimeout(async () => {

        try {
            await fetch(`${API_URL}/upgrade?email=${usuario_logueado}`, {
                method: "POST"
            });

            msg.innerHTML = "✅ Ahora eres PRO 🚀";

            cargarPerfil();

        } catch (e) {
            msg.innerHTML = "❌ Error en el pago";
        }

    }, 2000);
}


// 🔍 BUSCAR
async function buscar() {

    let presupuesto = document.getElementById("presupuesto").value;
    let tipo = document.getElementById("tipo").value;

    let resultados = document.getElementById("resultados");
    let error = document.getElementById("error");
    let uso = document.getElementById("uso");

    resultados.innerHTML = "";
    error.innerHTML = "";
    uso.innerHTML = "";

    if (!usuario_logueado) {
        error.innerHTML = "Debes iniciar sesión primero";
        return;
    }

    try {
        let res = await fetch(`${API_URL}/recomendar?presupuesto=${presupuesto}&tipo=${tipo}&email=${usuario_logueado}`);
        let data = await res.json();

        if (data.error) {
            error.innerHTML = data.error;
            return;
        }

        if (data.plan === "free") {
            uso.innerHTML = `Consultas: ${data.consultas_usadas}/3`;
        } else {
            uso.innerHTML = "🚀 Usuario PRO";
        }

        data.recomendaciones.forEach(d => {
            resultados.innerHTML += `
                <div class="resultado">
                    <b>${d.ciudad}</b> (${d.pais})<br>
                    Precio: ${d.precio_vuelo}€
                </div>
            `;
        });

        cargarPerfil();

    } catch (e) {
        error.innerHTML = "Error conectando con el servidor";
    }
}

</script>
